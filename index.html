<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS // AR MUSIC SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<style>
  :root {
    --neon: #00ff88;
    --cyan: #00ccff;
    --hot: #ff0055;
    --amber: #ffaa00;
    --bg: #050508;
    --card-bg: rgba(0, 255, 136, 0.04);
    --card-border: rgba(0, 255, 136, 0.18);
    --text: #d0ffe0;
    --muted: rgba(0, 255, 136, 0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: 'Share Tech Mono', monospace; color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }

  /* Scanlines */
  #scanlines {
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 136, 0.015) 2px,
      rgba(0, 255, 136, 0.015) 4px
    );
    z-index: 6;
  }

  /* Start overlay */
  #startOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at center, rgba(0,255,136,0.03) 0%, var(--bg) 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.6s ease;
  }
  #startOverlay .ring {
    width: 180px; height: 180px; border-radius: 50%;
    border: 2px solid var(--neon); position: relative;
    animation: pulseRing 2s ease-in-out infinite;
  }
  #startOverlay .ring::before {
    content: ''; position: absolute; inset: 12px; border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.3);
    animation: pulseRing 2s ease-in-out infinite 0.3s;
  }
  #startOverlay .ring::after {
    content: ''; position: absolute; inset: 28px; border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.15);
    animation: pulseRing 2s ease-in-out infinite 0.6s;
  }
  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.6; }
  }
  #startOverlay h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3.5rem;
    letter-spacing: 0.3em; color: var(--neon); margin-top: 2rem;
    text-shadow: 0 0 40px rgba(0,255,136,0.5), 0 0 80px rgba(0,255,136,0.2);
  }
  #startOverlay .sub {
    font-size: 0.85rem; color: var(--muted); letter-spacing: 0.5em; margin-top: 0.5rem;
  }
  #startOverlay .tap {
    margin-top: 3rem; font-size: 0.75rem; letter-spacing: 0.4em;
    color: var(--neon); animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

  /* Boot terminal */
  #bootTerminal {
    position: fixed; inset: 0; z-index: 99; background: var(--bg);
    display: none; flex-direction: column; justify-content: center;
    padding: 10%; font-size: 0.85rem; line-height: 2;
  }
  #bootTerminal .line { opacity: 0; }
  #bootTerminal .ok { color: var(--neon); }
  #bootTerminal .fail { color: var(--hot); }

  /* HUD elements */
  .hud-label {
    font-size: 0.6rem; letter-spacing: 0.25em; color: var(--muted);
    text-transform: uppercase;
  }
  .hud-value {
    font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--neon);
  }
  .hud-corner {
    position: absolute; width: 24px; height: 24px;
  }
  .hud-corner--tl { top: 0; left: 0; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
  .hud-corner--tr { top: 0; right: 0; border-top: 2px solid var(--neon); border-right: 2px solid var(--neon); }
  .hud-corner--bl { bottom: 0; left: 0; border-bottom: 2px solid var(--neon); border-left: 2px solid var(--neon); }
  .hud-corner--br { bottom: 0; right: 0; border-bottom: 2px solid var(--neon); border-right: 2px solid var(--neon); }

  /* Music cards */
  .music-card {
    position: absolute; width: 260px; height: 320px;
    background: var(--card-bg);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--card-border);
    border-radius: 16px; padding: 16px;
    box-shadow: 0 0 40px rgba(0,255,136,0.06), inset 0 1px 0 rgba(0,255,136,0.1);
    transition: box-shadow 0.4s ease;
    will-change: transform, opacity;
  }
  .music-card.active {
    box-shadow: 0 0 60px rgba(0,255,136,0.15), inset 0 1px 0 rgba(0,255,136,0.2), 0 0 120px rgba(0,255,136,0.05);
    border-color: rgba(0,255,136,0.35);
  }
  .music-card .cover {
    width: 100%; height: 160px; border-radius: 10px; object-fit: cover;
    border: 1px solid rgba(0,255,136,0.1);
  }
  .music-card .title {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem;
    color: #fff; margin-top: 12px; letter-spacing: 0.05em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .music-card .artist {
    font-size: 0.7rem; color: var(--muted); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .music-card .meta {
    display: flex; justify-content: space-between; align-items: center; margin-top: 12px;
  }
  .music-card .bpm-tag {
    font-size: 0.6rem; padding: 2px 8px; border-radius: 4px;
    border: 1px solid rgba(0,255,136,0.2); color: var(--neon);
    background: rgba(0,255,136,0.05);
  }
  .music-card .dur {
    font-size: 0.65rem; color: var(--muted);
  }

  /* Progress bar */
  #progressBar {
    position: absolute; bottom: 0; left: 16px; right: 16px; height: 3px;
    background: rgba(0,255,136,0.1); border-radius: 2px; overflow: hidden;
  }
  #progressFill {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, var(--neon), var(--cyan));
    box-shadow: 0 0 8px var(--neon);
    transition: width 0.3s linear;
  }

  /* Visualizer bars */
  .viz-bar {
    width: 3px; background: var(--neon); border-radius: 2px;
    box-shadow: 0 0 6px rgba(0,255,136,0.5);
    transition: height 0.05s linear;
    min-height: 2px;
  }

  /* Gesture notification */
  #gestureNotify {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.4rem;
    color: var(--neon); letter-spacing: 0.2em;
    text-shadow: 0 0 30px rgba(0,255,136,0.8), 0 0 60px rgba(0,255,136,0.3);
    opacity: 0; pointer-events: none;
  }

  /* Gesture guide */
  .gesture-icon {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; color: var(--muted);
    background: rgba(0,255,136,0.03);
    transition: all 0.3s ease;
  }
  .gesture-icon.active {
    border-color: var(--neon); color: var(--neon);
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.08);
  }
  .gesture-label {
    font-size: 0.5rem; color: var(--muted); letter-spacing: 0.15em;
    margin-top: 4px; text-align: center;
  }

  /* HUD arcs SVG */
  #hudArcs {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 4;
  }

  /* Status dot */
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon); box-shadow: 0 0 8px var(--neon);
    animation: dotPulse 1.5s ease-in-out infinite;
  }
  .status-dot.inactive { background: #333; box-shadow: none; animation: none; }
  @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* Now playing info */
  #nowPlaying {
    opacity: 0; transform: translateY(10px);
  }

  @media (max-width: 768px) {
    .music-card { width: 200px; height: 260px; padding: 12px; }
    .music-card .cover { height: 120px; }
    .music-card .title { font-size: 0.7rem; }
    #startOverlay h1 { font-size: 2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';

/* ============================
   Musical Constants
   ============================ */
const C3=130.81,D3=146.83,E3=164.81,F3=174.61,G3=196.00,A3=220.00,B3=246.94;
const C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392.00,A4=440.00,B4=493.88;
const C5=523.25,D5=587.33,E5=659.25,F5=698.46,G5=783.99;

/* ============================
   Song Dataset
   ============================ */
const songs = [
  {
    title: "NEON DREAMS", artist: "CyberWave", album: "Digital Horizon",
    duration: "3:42", bpm: 128, key: "#00ff88",
    cover: "https://picsum.photos/seed/nexus1/300/300.jpg",
    lead: [C4,0,E4,0,G4,0,C5,0, B4,0,G4,0,E4,0,0,0],
    bass: [C3,0,0,C3,0,0,C3,0, G3,0,0,G3,0,0,G3,0]
  },
  {
    title: "SYNTHWAVE RUSH", artist: "NeonPulse", album: "Midnight Drive",
    duration: "4:15", bpm: 135, key: "#00ccff",
    cover: "https://picsum.photos/seed/nexus2/300/300.jpg",
    lead: [E4,0,G4,0,B4,0,E5,0, D5,0,B4,0,G4,0,0,0],
    bass: [E3,0,0,E3,0,0,E3,0, D3,0,0,D3,0,0,D3,0]
  },
  {
    title: "CHROME HEARTS", artist: "DataStream", album: "Binary Sunset",
    duration: "3:58", bpm: 140, key: "#ff0055",
    cover: "https://picsum.photos/seed/nexus3/300/300.jpg",
    lead: [A3,0,C4,0,E4,0,A4,0, G4,0,E4,0,C4,0,0,0],
    bass: [A2,0,0,A2,0,0,A2,0, G2,0,0,G2,0,0,G2,0]
  },
  {
    title: "QUANTUM LEAP", artist: "ZeroGravity", album: "Event Horizon",
    duration: "5:01", bpm: 145, key: "#ffaa00",
    cover: "https://picsum.photos/seed/nexus4/300/300.jpg",
    lead: [F4,0,A4,0,C5,0,F5,0, E5,0,C5,0,A4,0,0,0],
    bass: [F3,0,0,F3,0,0,F3,0, E3,0,0,E3,0,0,E3,0]
  },
  {
    title: "VOID WALKER", artist: "DarkMatter", album: "Singularity",
    duration: "4:33", bpm: 120, key: "#cc44ff",
    cover: "https://picsum.photos/seed/nexus5/300/300.jpg",
    lead: [D4,0,F4,0,A4,0,D5,0, C5,0,A4,0,F4,0,0,0],
    bass: [D3,0,0,D3,0,0,D3,0, C3,0,0,C3,0,0,C3,0]
  }
];

/* ============================
   State
   ============================ */
let currentIndex = 0;
let isPlaying = false;
let audioCtx = null;
let analyser = null;
let masterGain = null;
let stepInterval = null;
let currentStep = 0;
let songProgress = 0;
let systemActive = false;
let handResults = null;

/* ============================
   Music Synth Engine
   ============================ */
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  analyser.smoothingTimeConstant = 0.8;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function playNote(freq, duration, type = 'sawtooth', vol = 0.12) {
  if (!audioCtx || freq <= 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = type;
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 1800 + Math.random() * 600;
  filter.Q.value = 2;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playKick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playHihat() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.04;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 8000;
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

function startPlaying() {
  if (isPlaying) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  isPlaying = true;
  currentStep = 0;
  const song = songs[currentIndex];
  const stepMs = (60000 / song.bpm) / 4;

  stepInterval = setInterval(() => {
    const idx = currentStep % song.lead.length;
    const leadFreq = song.lead[idx];
    const bassFreq = song.bass[idx];
    if (leadFreq > 0) playNote(leadFreq, stepMs * 2.5 / 1000, 'sawtooth', 0.1);
    if (bassFreq > 0) playNote(bassFreq, stepMs * 3 / 1000, 'sine', 0.18);
    // Kick on beat (every 4 steps)
    if (currentStep % 4 === 0) playKick();
    // Hihat on off-beats
    if (currentStep % 4 === 2) playHihat();

    songProgress = (currentStep % (song.lead.length * 4)) / (song.lead.length * 4);
    currentStep++;
  }, stepMs);

  updateNowPlaying();
}

function stopPlaying() {
  isPlaying = false;
  if (stepInterval) { clearInterval(stepInterval); stepInterval = null; }
}

/* ============================
   Hand Connection Map
   ============================ */
const HAND_CONNS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];
const FINGERTIPS = [4,8,12,16,20];

/* ============================
   Gesture Detector
   ============================ */
class GestureDetector {
  constructor() {
    this.wristHistory = [];
    this.maxHistory = 18;
    this.cooldown = 0;
    this.lastGesture = 'none';
    this.pinchActive = false;
    this.pinchCooldown = 0;
  }

  detect(landmarks) {
    if (this.cooldown > 0) { this.cooldown--; return 'none'; }
    if (!landmarks || landmarks.length < 21) return 'none';

    // Thumbs up/down
    const thumbUp = this.isThumbsUp(landmarks);
    const thumbDown = this.isThumbsDown(landmarks);
    if (thumbUp) { this.cooldown = 40; this.lastGesture = 'thumbs_up'; return 'thumbs_up'; }
    if (thumbDown) { this.cooldown = 40; this.lastGesture = 'thumbs_down'; return 'thumbs_down'; }

    // Pinch
    const pinch = this.isPinching(landmarks);
    if (pinch && !this.pinchActive) {
      this.pinchActive = true;
      this.cooldown = 25;
      this.lastGesture = 'pinch';
      return 'pinch';
    }
    if (!pinch) this.pinchActive = false;

    // Swipe
    const swipe = this.detectSwipe(landmarks);
    if (swipe !== 'none') {
      this.cooldown = 35;
      this.lastGesture = swipe;
      return swipe;
    }

    return 'none';
  }

  isThumbsUp(lm) {
    if (lm[4].y > lm[3].y) return false;
    const tips = [8,12,16,20], pips = [6,10,14,18];
    return tips.every((t,i) => lm[t].y > lm[pips[i]].y - 0.02);
  }

  isThumbsDown(lm) {
    if (lm[4].y < lm[3].y + 0.03) return false;
    const tips = [8,12,16,20], pips = [6,10,14,18];
    return tips.every((t,i) => lm[t].y > lm[pips[i]].y - 0.02);
  }

  isPinching(lm) {
    const dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
    return Math.sqrt(dx*dx + dy*dy) < 0.055;
  }

  detectSwipe(lm) {
    const wx = lm[0].x;
    this.wristHistory.push(wx);
    if (this.wristHistory.length > this.maxHistory) this.wristHistory.shift();
    if (this.wristHistory.length < this.maxHistory) return 'none';

    const first = this.wristHistory.slice(0, 6).reduce((a,b)=>a+b,0) / 6;
    const last = this.wristHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
    const delta = last - first;

    if (delta > 0.12) { this.wristHistory = []; return 'swipe_left'; }
    if (delta < -0.12) { this.wristHistory = []; return 'swipe_right'; }
    return 'none';
  }
}

const gestureDetector = new GestureDetector();

/* ============================
   Draw Neon Hand Skeleton
   ============================ */
function drawHandSkeleton(ctx, landmarks, w, h) {
  if (!landmarks || landmarks.length < 21) return;

  // Draw connections
  for (const [a, b] of HAND_CONNS) {
    const ax = landmarks[a].x * w, ay = landmarks[a].y * h;
    const bx = landmarks[b].x * w, by = landmarks[b].y * h;
    const isThumb = (a <= 4 && b <= 4);

    ctx.save();
    ctx.shadowBlur = isThumb ? 18 : 12;
    ctx.shadowColor = isThumb ? '#00ccff' : '#00ff88';
    ctx.strokeStyle = isThumb ? 'rgba(0,204,255,0.8)' : 'rgba(0,255,136,0.7)';
    ctx.lineWidth = isThumb ? 3 : 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.stroke(); // Double stroke for stronger glow
    ctx.restore();
  }

  // Draw joints
  for (let i = 0; i < 21; i++) {
    const x = landmarks[i].x * w, y = landmarks[i].y * h;
    const isTip = FINGERTIPS.includes(i);
    const radius = isTip ? 6 : 3.5;
    const color = isTip ? '#00ccff' : '#00ff88';

    ctx.save();
    ctx.shadowBlur = isTip ? 25 : 12;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(1, radius), 0, Math.PI * 2);
    ctx.fill();

    // Inner white core
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.5, radius * 0.35), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Draw energy lines from fingertips
  for (const tip of FINGERTIPS) {
    const x = landmarks[tip].x * w, y = landmarks[tip].y * h;
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ccff';
    ctx.strokeStyle = 'rgba(0,204,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + (Math.random() - 0.5) * 60, y - 40 - Math.random() * 30);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// Particles

function updateCards(animate = true) {
  cardElements.forEach((card, i) => {
    const offset = i - currentIndex;
    const absOff = Math.abs(offset);
    const x = offset * 300;
    const rz = offset * -8;
    const ry = offset * -12;
    const s = Math.max(0.5, 1 - absOff * 0.18);
    const op = Math.max(0, 1 - absOff * 0.35);
    const zIdx = 10 - absOff;

    card.style.zIndex = zIdx;
    card.classList.toggle('active', offset === 0);

    if (animate) {
      gsap.to(card, { x, rotateZ: rz, rotateY: ry, scale: s, opacity: op, duration: 0.55, ease: 'power2.out' });
    } else {
      gsap.set(card, { x, rotateZ: rz, rotateY: ry, scale: s, opacity: op });
    }
  });
}

/* ============================
   Show Gesture Notification
   ============================ */
function showGestureNotify(text) {
  const el = document.getElementById('gestureNotify');
  el.textContent = text;
  gsap.killTweensOf(el);
  gsap.fromTo(el,
    { opacity: 0, scale: 1.5, y: -10 },
    { opacity: 1, scale: 1, y: 0, duration: 0.2, ease: 'power2.out',
      onComplete: () => {
        gsap.to(el, { opacity: 0, y: -15, duration: 0.6, delay: 0.4, ease: 'power2.in' });
      }
    }
  );
}

function flashGestureIcon(id) {
  const el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 600);
}

/* ============================
   Handle Gesture
   ============================ */
function handleGesture(gesture) {
  switch(gesture) {
    case 'swipe_left':
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      updateCards(true);
      if (isPlaying) { stopPlaying(); startPlaying(); }
      updateNowPlaying();
      showGestureNotify('PREV');
      flashGestureIcon('gSwipeL');
      break;
    case 'swipe_right':
      currentIndex = (currentIndex + 1) % songs.length;
      updateCards(true);
      if (isPlaying) { stopPlaying(); startPlaying(); }
      updateNowPlaying();
      showGestureNotify('NEXT');
      flashGestureIcon('gSwipeR');
      break;
    case 'pinch':
      if (!isPlaying) {
        startPlaying();
        showGestureNotify('PLAY');
      } else {
        showGestureNotify('SELECT');
      }
      flashGestureIcon('gPinch');
      break;
    case 'thumbs_up':
      if (!isPlaying) {
        startPlaying();
        showGestureNotify('PLAY');
      }
      flashGestureIcon('gThumbUp');
      break;
    case 'thumbs_down':
      if (isPlaying) {
        stopPlaying();
        showGestureNotify('PAUSE');
      }
      flashGestureIcon('gThumbDn');
      break;
  }
}

/* ============================
   FPS Counter
   ============================ */
let frameCount = 0, lastFpsTime = performance.now(), fps = 0;
function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fpsDisplay').textContent = fps;
  }
}

/* ============================
   Main Render Loop
   ============================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  updateFps();
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Three.js animations
  ico.rotation.x = t * 0.15;
  ico.rotation.y = t * 0.2;
  oct.rotation.x = -t * 0.25;
  oct.rotation.z = t * 0.18;
  ring.rotation.z = t * 0.08;

  // Audio reactivity
  if (analyser && isPlaying) {
    const dataArr = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArr);
    let sum = 0;
    for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
    audioLevel = sum / dataArr.length / 255;

    // Update visualizer bars
    for (let i = 0; i < vizBarCount; i++) {
      const di = Math.floor(i * dataArr.length / vizBarCount);
      const val = dataArr[di] / 255;
      vizBarEls[i].style.height = Math.max(2, val * 40) + 'px';
      vizBarEls[i].style.opacity = 0.3 + val * 0.7;
    }
    for (let i = 0; i < 16; i++) {
      const di = Math.floor(i * dataArr.length / 16);
      const val = dataArr[di] / 255;
      vizMiniEls[i].style.height = Math.max(1, val * 20) + 'px';
    }
  } else {
    audioLevel *= 0.95;
    for (const bar of vizBarEls) { bar.style.height = '2px'; bar.style.opacity = '0.3'; }
    for (const bar of vizMiniEls) { bar.style.height = '1px'; }
  }

  smoothAudioLevel += (audioLevel - smoothAudioLevel) * 0.15;

  // Audio-reactive icosahedron scale
  const icoScale = 1 + smoothAudioLevel * 0.6;
  ico.scale.setScalar(icoScale);
  icoMat.opacity = 0.06 + smoothAudioLevel * 0.12;

  const octScale = 1 + smoothAudioLevel * 0.4;
  oct.scale.setScalar(octScale);

  // Particle drift
  const positions = pGeo.attributes.position.array;
  const speed = isPlaying ? (1 + smoothAudioLevel * 3) : 0.5;
  for (let i = 0; i < pCount; i++) {
    positions[i*3]   += pVel[i*3] * speed;
    positions[i*3+1] += pVel[i*3+1] * speed;
    positions[i*3+2] += pVel[i*3+2] * speed;
    // Wrap around
    if (positions[i*3] > 9) positions[i*3] = -9;
    if (positions[i*3] < -9) positions[i*3] = 9;
    if (positions[i*3+1] > 6) positions[i*3+1] = -6;
    if (positions[i*3+1] < -6) positions[i*3+1] = 6;
  }
  pGeo.attributes.position.needsUpdate = true;
  pMat.opacity = 0.3 + smoothAudioLevel * 0.5;
  pMat.size = 0.03 + smoothAudioLevel * 0.06;

  // HUD progress arc
  const circumference = 2 * Math.PI * 210;
  const progressArc = document.getElementById('progressArc');
  if (isPlaying) {
    const dashLen = songProgress * circumference;
    progressArc.setAttribute('stroke-dasharray', `${dashLen} ${circumference}`);
    progressArc.setAttribute('stroke', songs[currentIndex].key);
  } else {
    progressArc.setAttribute('stroke-dasharray', `0 ${circumference}`);
  }

  // Update progress fill on active card
  const activeCard = cardElements[currentIndex];
  if (activeCard) {
    const fill = activeCard.querySelector('#progressFill');
    if (fill) fill.style.width = (songProgress * 100) + '%';
  }

  renderer.render(scene, cam3d);

  // Draw hand skeleton on 2D canvas
  hCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
  if (handResults && handResults.multiHandLandmarks) {
    const numHands = handResults.multiHandLandmarks.length;
    document.getElementById('handCount').textContent = numHands;

    for (const landmarks of handResults.multiHandLandmarks) {
      drawHandSkeleton(hCtx, landmarks, handCanvas.width, handCanvas.height);

      // Detect gestures
      const gesture = gestureDetector.detect(landmarks);
      if (gesture !== 'none') handleGesture(gesture);
    }

    // Draw pinch indicator
    if (handResults.multiHandLandmarks.length > 0) {
      const lm = handResults.multiHandLandmarks[0];
      const thumbTip = lm[4], indexTip = lm[8];
      const dx = thumbTip.x - indexTip.x, dy = thumbTip.y - indexTip.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 0.1) {
        const cx = (thumbTip.x + indexTip.x) / 2 * handCanvas.width;
        const cy = (thumbTip.y + indexTip.y) / 2 * handCanvas.height;
        const radius = Math.max(5, (0.1 - dist) * 500);

        hCtx.save();
        hCtx.shadowBlur = 20;
        hCtx.shadowColor = '#00ccff';
        hCtx.strokeStyle = `rgba(0,204,255,${0.3 + (0.1 - dist) * 8})`;
        hCtx.lineWidth = 2;
        hCtx.beginPath();
        hCtx.arc(cx, cy, radius, 0, Math.PI * 2);
        hCtx.stroke();
        hCtx.restore();
      }
    }
  } else {
    document.getElementById('handCount').textContent = '0';
  }
}

animate();

/* ============================
   Boot Sequence & Init
   ============================ */
const startOverlay = document.getElementById('startOverlay');
const bootTerminal = document.getElementById('bootTerminal');

const bootLines = [
  { text: '> INITIALIZING NEXUS AR MUSIC SYSTEM...', delay: 0 },
  { text: '> CAMERA MODULE.............. ', status: 'ok', delay: 400 },
  { text: '> HAND TRACKING ENGINE....... ', status: 'ok', delay: 800 },
  { text: '> NEURAL GESTURE PROCESSOR... ', status: 'ok', delay: 1200 },
  { text: '> AUDIO SYNTHESIZER......... ', status: 'ok', delay: 1600 },
  { text: '> 3D RENDERING PIPELINE...... ', status: 'ok', delay: 2000 },
  { text: '> HOLOGRAPHIC UI............. ', status: 'ok', delay: 2400 },
  { text: '', delay: 2900 },
  { text: '> SYSTEM READY', status: 'ready', delay: 3000 },
];

async function runBoot() {
  startOverlay.style.opacity = '0';
  startOverlay.style.pointerEvents = 'none';
  await new Promise(r => setTimeout(r, 500));
  startOverlay.style.display = 'none';

  bootTerminal.style.display = 'flex';
  for (const line of bootLines) {
    await new Promise(r => setTimeout(r, line.delay === 0 ? 100 : 350));
    const div = document.createElement('div');
    div.className = 'line';
    if (line.status === 'ok') {
      div.innerHTML = `${line.text}<span class="ok">[OK]</span>`;
    } else if (line.status === 'ready') {
      div.innerHTML = `<span class="ok" style="font-weight:bold;">${line.text}</span>`;
    } else {
      div.textContent = line.text;
    }
    bootTerminal.appendChild(div);
    gsap.to(div, { opacity: 1, duration: 0.15 });
  }

  await new Promise(r => setTimeout(r, 800));
  gsap.to(bootTerminal, {
    opacity: 0, duration: 0.5,
    onComplete: () => {
      bootTerminal.style.display = 'none';
      activateSystem();
    }
  });
}

async function activateSystem() {
  systemActive = true;

  // Init audio
  initAudio();

  // Init MediaPipe Hands
  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onHandResults);

    const videoEl = document.getElementById('webcam');
    const mpCamera = new Camera(videoEl, {
      onFrame: async () => {
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720
    });
    await mpCamera.start();
  } catch(e) {
    console.warn('Camera/MediaPipe error:', e);
    // Show fallback message
    const errMsg = document.createElement('div');
    errMsg.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:50;padding:12px 24px;border:1px solid rgba(255,0,85,0.4);background:rgba(255,0,85,0.08);color:#ff0055;font-size:0.75rem;border-radius:8px;text-align:center;letter-spacing:0.1em;';
    errMsg.textContent = 'CAMERA UNAVAILABLE — USE GESTURE GUIDE ICONS TO CONTROL';
    document.body.appendChild(errMsg);
  }

  // Update status
  document.getElementById('statusDot').classList.remove('inactive');
  document.getElementById('statusText').textContent = 'ACTIVE';
  document.getElementById('statusText').style.color = 'var(--neon)';

  // Animate UI elements in
  gsap.to('#nowPlaying', { opacity: 1, y: 0, duration: 0.6, delay: 0.2, ease: 'power2.out' });
  gsap.fromTo('#hudArcs', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.8, delay: 0.1, ease: 'power2.out' });

  // Entrance animation for cards
  cardElements.forEach((card, i) => {
    gsap.fromTo(card, { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.5, delay: 0.3 + i * 0.08, ease: 'power2.out' });
  });

  updateNowPlaying();
}

/* ============================
   Start on Click / Keyboard
   ============================ */
function startSystem() {
  if (startOverlay.style.display === 'none') return;
  runBoot();
}

startOverlay.addEventListener('click', startSystem);
startOverlay.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') startSystem();
});

function playNote(freq, duration, type = 'sawtooth', vol = 0.12) {

  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);

  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.04;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 8000;
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

function startPlaying() {
  if (isPlaying) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  isPlaying = true;
  currentStep = 0;
  const song = songs[currentIndex];
  const stepMs = (60000 / song.bpm) / 4;

  stepInterval = setInterval(() => {
    const idx = currentStep % song.lead.length;
    const leadFreq = song.lead[idx];
    const bassFreq = song.bass[idx];
    if (leadFreq > 0) playNote(leadFreq, stepMs * 2.5 / 1000, 'sawtooth', 0.1);
    if (bassFreq > 0) playNote(bassFreq, stepMs * 3 / 1000, 'sine', 0.18);
    // Kick on beat (every 4 steps)
    if (currentStep % 4 === 0) playKick();
    // Hihat on off-beats
    if (currentStep % 4 === 2) playHihat();

    songProgress = (currentStep % (song.lead.length * 4)) / (song.lead.length * 4);
    currentStep++;
  }, stepMs);

  updateNowPlaying();
}

function stopPlaying() {
  isPlaying = false;
  if (stepInterval) { clearInterval(stepInterval); stepInterval = null; }
}

/* ============================
   Hand Connection Map
   ============================ */
const HAND_CONNS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];
const FINGERTIPS = [4,8,12,16,20];

/* ============================
   Gesture Detector
   ============================ */
class GestureDetector {
  constructor() {
    this.wristHistory = [];
    this.maxHistory = 18;
    this.cooldown = 0;
    this.lastGesture = 'none';
    this.pinchActive = false;
    this.pinchCooldown = 0;
  }

  detect(landmarks) {
    if (this.cooldown > 0) { this.cooldown--; return 'none'; }
    if (!landmarks || landmarks.length < 21) return 'none';

    // Thumbs up/down
    const thumbUp = this.isThumbsUp(landmarks);
    const thumbDown = this.isThumbsDown(landmarks);
    if (thumbUp) { this.cooldown = 40; this.lastGesture = 'thumbs_up'; return 'thumbs_up'; }
    if (thumbDown) { this.cooldown = 40; this.lastGesture = 'thumbs_down'; return 'thumbs_down'; }

    // Pinch
    const pinch = this.isPinching(landmarks);
    if (pinch && !this.pinchActive) {
      this.pinchActive = true;
      this.cooldown = 25;
      this.lastGesture = 'pinch';
      return 'pinch';
    }
    if (!pinch) this.pinchActive = false;

    // Swipe
    const swipe = this.detectSwipe(landmarks);
    if (swipe !== 'none') {
      this.cooldown = 35;
      this.lastGesture = swipe;
      return swipe;
    }

    return 'none';
  }

  isThumbsUp(lm) {
    if (lm[4].y > lm[3].y) return false;
    const tips = [8,12,16,20], pips = [6,10,14,18];
    return tips.every((t,i) => lm[t].y > lm[pips[i]].y - 0.02);
  }

  isThumbsDown(lm) {
    if (lm[4].y < lm[3].y + 0.03) return false;
    const tips = [8,12,16,20], pips = [6,10,14,18];
    return tips.every((t,i) => lm[t].y > lm[pips[i]].y - 0.02);
  }

  isPinching(lm) {
    const dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
    return Math.sqrt(dx*dx + dy*dy) < 0.055;
  }

  detectSwipe(lm) {
    const wx = lm[0].x;
    this.wristHistory.push(wx);
    if (this.wristHistory.length > this.maxHistory) this.wristHistory.shift();
    if (this.wristHistory.length < this.maxHistory) return 'none';

    const first = this.wristHistory.slice(0, 6).reduce((a,b)=>a+b,0) / 6;
    const last = this.wristHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
    const delta = last - first;

    if (delta > 0.12) { this.wristHistory = []; return 'swipe_left'; }
    if (delta < -0.12) { this.wristHistory = []; return 'swipe_right'; }
    return 'none';
  }
}

const gestureDetector = new GestureDetector();

/* ============================
   Draw Neon Hand Skeleton
   ============================ */
function drawHandSkeleton(ctx, landmarks, w, h) {
  if (!landmarks || landmarks.length < 21) return;

  // Draw connections
  for (const [a, b] of HAND_CONNS) {
    const ax = landmarks[a].x * w, ay = landmarks[a].y * h;
    const bx = landmarks[b].x * w, by = landmarks[b].y * h;
    const isThumb = (a <= 4 && b <= 4);

    ctx.save();
    ctx.shadowBlur = isThumb ? 18 : 12;
    ctx.shadowColor = isThumb ? '#00ccff' : '#00ff88';
    ctx.strokeStyle = isThumb ? 'rgba(0,204,255,0.8)' : 'rgba(0,255,136,0.7)';
    ctx.lineWidth = isThumb ? 3 : 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.stroke(); // Double stroke for stronger glow
    ctx.restore();
  }

  // Draw joints
  for (let i = 0; i < 21; i++) {
    const x = landmarks[i].x * w, y = landmarks[i].y * h;
    const isTip = FINGERTIPS.includes(i);
    const radius = isTip ? 6 : 3.5;
    const color = isTip ? '#00ccff' : '#00ff88';

    ctx.save();
    ctx.shadowBlur = isTip ? 25 : 12;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(1, radius), 0, Math.PI * 2);
    ctx.fill();

    // Inner white core
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.5, radius * 0.35), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Draw energy lines from fingertips
  for (const tip of FINGERTIPS) {
    const x = landmarks[tip].x * w, y = landmarks[tip].y * h;
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ccff';
    ctx.strokeStyle = 'rgba(0,204,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + (Math.random() - 0.5) * 60, y - 40 - Math.random() * 30);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

/* ============================
   Handle Gesture
   ============================ */
function handleGesture(gesture) {
  switch(gesture) {
    case 'swipe_left':
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      updateCards(true);
      if (isPlaying) { stopPlaying(); startPlaying(); }
      updateNowPlaying();
      showGestureNotify('PREV');
      flashGestureIcon('gSwipeL');
      break;
    case 'swipe_right':
      currentIndex = (currentIndex + 1) % songs.length;
      updateCards(true);
      if (isPlaying) { stopPlaying(); startPlaying(); }
      updateNowPlaying();
      showGestureNotify('NEXT');
      flashGestureIcon('gSwipeR');
      break;
    case 'pinch':
      if (!isPlaying) {
        startPlaying();
        showGestureNotify('PLAY');
      } else {
        showGestureNotify('SELECT');
      }
      flashGestureIcon('gPinch');
      break;
    case 'thumbs_up':
      if (!isPlaying) {
        startPlaying();
        showGestureNotify('PLAY');
      }
      flashGestureIcon('gThumbUp');
      break;
    case 'thumbs_down':
      if (isPlaying) {
        stopPlaying();
        showGestureNotify('PAUSE');
      }
      flashGestureIcon('gThumbDn');
      break;
  }
}

function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {

/* ============================
   Main Render Loop
   ============================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  updateFps();
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Three.js animations
  ico.rotation.x = t * 0.15;
  ico.rotation.y = t * 0.2;
  oct.rotation.x = -t * 0.25;
  oct.rotation.z = t * 0.18;
  ring.rotation.z = t * 0.08;

  // Audio reactivity
  if (analyser && isPlaying) {
    const dataArr = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArr);
    let sum = 0;
    for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
    audioLevel = sum / dataArr.length / 255;

    // Update visualizer bars
    for (let i = 0; i < vizBarCount; i++) {
      const di = Math.floor(i * dataArr.length / vizBarCount);
      const val = dataArr[di] / 255;
      vizBarEls[i].style.height = Math.max(2, val * 40) + 'px';
      vizBarEls[i].style.opacity = 0.3 + val * 0.7;
    }
    for (let i = 0; i < 16; i++) {
      const di = Math.floor(i * dataArr.length / 16);
      const val = dataArr[di] / 255;
      vizMiniEls[i].style.height = Math.max(1, val * 20) + 'px';
    }
  } else {
    audioLevel *= 0.95;
    for (const bar of vizBarEls) { bar.style.height = '2px'; bar.style.opacity = '0.3'; }
    for (const bar of vizMiniEls) { bar.style.height = '1px'; }
  }

  smoothAudioLevel += (audioLevel - smoothAudioLevel) * 0.15;

  // Audio-reactive icosahedron scale
  const icoScale = 1 + smoothAudioLevel * 0.6;
  ico.scale.setScalar(icoScale);
  icoMat.opacity = 0.06 + smoothAudioLevel * 0.12;

  const octScale = 1 + smoothAudioLevel * 0.4;
  oct.scale.setScalar(octScale);

  // Particle drift
  const positions = pGeo.attributes.position.array;
  const speed = isPlaying ? (1 + smoothAudioLevel * 3) : 0.5;
  for (let i = 0; i < pCount; i++) {
    positions[i*3]   += pVel[i*3] * speed;
    positions[i*3+1] += pVel[i*3+1] * speed;
    positions[i*3+2] += pVel[i*3+2] * speed;
    // Wrap around
    if (positions[i*3] > 9) positions[i*3] = -9;
    if (positions[i*3] < -9) positions[i*3] = 9;
    if (positions[i*3+1] > 6) positions[i*3+1] = -6;
    if (positions[i*3+1] < -6) positions[i*3+1] = 6;
  }
  pGeo.attributes.position.needsUpdate = true;
  pMat.opacity = 0.3 + smoothAudioLevel * 0.5;
  pMat.size = 0.03 + smoothAudioLevel * 0.06;

  // HUD progress arc
  const circumference = 2 * Math.PI * 210;
  const progressArc = document.getElementById('progressArc');
  if (isPlaying) {
    const dashLen = songProgress * circumference;
    progressArc.setAttribute('stroke-dasharray', `${dashLen} ${circumference}`);
    progressArc.setAttribute('stroke', songs[currentIndex].key);
  } else {
    progressArc.setAttribute('stroke-dasharray', `0 ${circumference}`);
  }

  // Update progress fill on active card
  const activeCard = cardElements[currentIndex];
  if (activeCard) {
    const fill = activeCard.querySelector('#progressFill');
    if (fill) fill.style.width = (songProgress * 100) + '%';
  }

  renderer.render(scene, cam3d);

  // Draw hand skeleton on 2D canvas
  hCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
  if (handResults && handResults.multiHandLandmarks) {
    const numHands = handResults.multiHandLandmarks.length;
    document.getElementById('handCount').textContent = numHands;

    for (const landmarks of handResults.multiHandLandmarks) {
      drawHandSkeleton(hCtx, landmarks, handCanvas.width, handCanvas.height);

      // Detect gestures
      const gesture = gestureDetector.detect(landmarks);
      if (gesture !== 'none') handleGesture(gesture);
    }

    // Draw pinch indicator
    if (handResults.multiHandLandmarks.length > 0) {
      const lm = handResults.multiHandLandmarks[0];
      const thumbTip = lm[4], indexTip = lm[8];
      const dx = thumbTip.x - indexTip.x, dy = thumbTip.y - indexTip.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 0.1) {
        const cx = (thumbTip.x + indexTip.x) / 2 * handCanvas.width;
        const cy = (thumbTip.y + indexTip.y) / 2 * handCanvas.height;
        const radius = Math.max(5, (0.1 - dist) * 500);

        hCtx.save();
        hCtx.shadowBlur = 20;
        hCtx.shadowColor = '#00ccff';
        hCtx.strokeStyle = `rgba(0,204,255,${0.3 + (0.1 - dist) * 8})`;
        hCtx.lineWidth = 2;
        hCtx.beginPath();
        hCtx.arc(cx, cy, radius, 0, Math.PI * 2);
        hCtx.stroke();
        hCtx.restore();
      }
    }
  } else {
    document.getElementById('handCount').textContent = '0';
  }
}

];

async function runBoot() {
  startOverlay.style.opacity = '0';
  startOverlay.style.pointerEvents = 'none';
  await new Promise(r => setTimeout(r, 500));
  startOverlay.style.display = 'none';

  bootTerminal.style.display = 'flex';
  for (const line of bootLines) {
    await new Promise(r => setTimeout(r, line.delay === 0 ? 100 : 350));
    const div = document.createElement('div');
    div.className = 'line';
    if (line.status === 'ok') {
      div.innerHTML = `${line.text}<span class="ok">[OK]</span>`;
    } else if (line.status === 'ready') {
      div.innerHTML = `<span class="ok" style="font-weight:bold;">${line.text}</span>`;
    } else {
      div.textContent = line.text;
    }
    bootTerminal.appendChild(div);
    gsap.to(div, { opacity: 1, duration: 0.15 });
  }

  await new Promise(r => setTimeout(r, 800));
  gsap.to(bootTerminal, {
    opacity: 0, duration: 0.5,
    onComplete: () => {
      bootTerminal.style.display = 'none';
      activateSystem();
    }
  });
}

async function activateSystem() {
  systemActive = true;

  // Init audio
  initAudio();

  // Init MediaPipe Hands
  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onHandResults);

    const videoEl = document.getElementById('webcam');
    const mpCamera = new Camera(videoEl, {
      onFrame: async () => {
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720
    });
    await mpCamera.start();
  } catch(e) {
    console.warn('Camera/MediaPipe error:', e);
    // Show fallback message
    const errMsg = document.createElement('div');
    errMsg.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:50;padding:12px 24px;border:1px solid rgba(255,0,85,0.4);background:rgba(255,0,85,0.08);color:#ff0055;font-size:0.75rem;border-radius:8px;text-align:center;letter-spacing:0.1em;';
    errMsg.textContent = 'CAMERA UNAVAILABLE — USE GESTURE GUIDE ICONS TO CONTROL';
    document.body.appendChild(errMsg);
  }

  // Update status
  document.getElementById('statusDot').classList.remove('inactive');
  document.getElementById('statusText').textContent = 'ACTIVE';
  document.getElementById('statusText').style.color = 'var(--neon)';

  // Animate UI elements in
  gsap.to('#nowPlaying', { opacity: 1, y: 0, duration: 0.6, delay: 0.2, ease: 'power2.out' });
  gsap.fromTo('#hudArcs', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.8, delay: 0.1, ease: 'power2.out' });

  // Entrance animation for cards
  cardElements.forEach((card, i) => {
    gsap.fromTo(card, { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.5, delay: 0.3 + i * 0.08, ease: 'power2.out' });
  });

  updateNowPlaying();
}

/* ============================
   Start on Click / Keyboard
   ============================ */
function startSystem() {
  if (startOverlay.style.display === 'none') return;
  runBoot();
}

startOverlay.addEventListener('click', startSystem);
startOverlay.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') startSystem();
});

/* ============================
   Fallback: Click Gesture Icons
   (When camera is not available)
   ============================ */
document.getElementById('gSwipeL').style.pointerEvents = 'auto';
document.getElementById('gSwipeR').style.pointerEvents = 'auto';
document.getElementById('gPinch').style.pointerEvents = 'auto';
document.getElementById('gThumbUp').style.pointerEvents = 'auto';
document.getElementById('gThumbDn').style.pointerEvents = 'auto';
document.getElementById('gSwipeL').style.cursor = 'pointer';
document.getElementById('gSwipeR').style.cursor = 'pointer';
document.getElementById('gPinch').style.cursor = 'pointer';
document.getElementById('gThumbUp').style.cursor = 'pointer';
document.getElementById('gThumbDn').style.cursor = 'pointer';

document.getElementById('gSwipeL').addEventListener('click', () => handleGesture('swipe_left'));
document.getElementById('gSwipeR').addEventListener('click', () => handleGesture('swipe_right'));
document.getElementById('gPinch').addEventListener('click', () => handleGesture('pinch'));
document.getElementById('gThumbUp').addEventListener('click', () => handleGesture('thumbs_up'));
document.getElementById('gThumbDn').addEventListener('click', () => handleGesture('thumbs_down'));

/* ============================
   Keyboard fallback controls
   ============================ */
window.addEventListener('keydown', (e) => {
  if (!systemActive) return;
  switch(e.key) {
    case 'ArrowLeft': handleGesture('swipe_left'); break;
    case 'ArrowRight': handleGesture('swipe_right'); break;
    case ' ': e.preventDefault(); handleGesture(isPlaying ? 'thumbs_down' : 'thumbs_up'); break;
    case 'Enter': handleGesture('pinch'); break;
  }
});

</script>
